<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUSAY STORE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
    --bg: #0a0a0a;
    --card:#161616;
    --gold:#d4af37;
    --text:#fff;
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color:var(--text);
    padding:15px;
}

header{
    text-align:center;
    padding: 10px 0 20px 0;
}

header h1{
    color:var(--gold);
    margin:0;
    font-size: 1.5rem;
}

.main-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-width: 450px;
    margin: auto;
}

.box{
    background: var(--card);
    border: 1px solid rgba(212,175,55,0.08);
    border-radius: 12px;
    height: 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: var(--transition);
}

.box:hover { border-color: var(--gold); background: rgba(212,175,55,0.05); }
.box:active { transform: scale(0.95); }
.box i{ color: var(--gold); font-size: 1.3rem; margin-bottom: 5px; }
.box span { font-size: 0.75rem; font-weight: 500; }

.offers-panel{
    display:none;
    position:fixed;
    inset:0;
    background: rgba(10,10,10,0.98);
    padding:15px;
    overflow:auto;
    z-index: 1000;
    animation: slideUp 0.3s ease;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 15px;
    border-bottom: 1px solid #222;
    padding-bottom: 10px;
}

.back-btn {
    background: none;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 4px 12px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 0.8rem;
}

.mini-card{
    background:#1c1c1c;
    padding: 10px 15px;
    border-radius:10px;
    margin-bottom:10px;
    border:1px solid #282828;
}

.mini-card h3 { margin: 0; font-size: 0.95rem; color: var(--gold); }
.mini-card p { margin: 4px 0 8px 0; font-size: 0.8rem; color: #888; }

.btn-group { display: flex; gap: 8px; }

.btn{
    flex: 1;
    padding: 8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
}

.wa{ background:var(--gold); color:#000; }
.tg{ background:#229ed9; color:#fff; }
</style>
</head>

<header>
    <h1>𝙌𝙐𝙎𝘼𝙔 𝙎𝙏𝙊𝙍𝙀</h1>

<div class="main-grid">

function showOffers(k){
    let p = data[k];
    if(!p) return;
    document.getElementById("panelTitle").innerText = p.title;
    let box = document.getElementById("offersContainer");
    box.innerHTML="";
    p.items.forEach(i=>{
        box.innerHTML += `
        <div class="mini-card">
            <h3>${i.t}</h3>
            <p>${i.d}</p>
            <div class="btn-group">
                <button class="btn wa" onclick="orderWA('${i.t}')"><i class="fa-brands fa-whatsapp"></i> واتساب</button>
                <button class="btn tg" onclick="orderTG('${i.t}')"><i class="fa-brands fa-telegram"></i> تليجرام</button>
            </div>
        </div>`;
    });
    document.getElementById("offersPanel").style.display="block";
}

function orderWA(service){
    window.open(`https://api.whatsapp.com/send?phone=${MY_NUMBER}&text=${encodeURIComponent("أهلاً قُصي، أرغب في طلب خدمة: " + service)}`);
}

function orderTG(service){
    window.open(`https://t.me/${TELEGRAM_USER}?text=${encodeURIComponent("أهلاً، أود طلب: " + service)}`);
}

function closeOffers(){
    document.getElementById("offersPanel").style.display="none";
}
